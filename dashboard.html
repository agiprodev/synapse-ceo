<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Synapse Beast | Pitch Deck Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              beast: {
                bg: "#070b14",
                panel: "#0f172a",
                panelSoft: "#111c34",
                neon: "#38bdf8",
                neon2: "#22d3ee",
                danger: "#fb7185",
                ok: "#34d399",
                warning: "#fbbf24",
              },
            },
            boxShadow: {
              neon: "0 0 25px rgba(34, 211, 238, 0.18)",
            },
          },
        },
      };
    </script>
  </head>
  <body class="min-h-screen bg-beast-bg text-slate-100">
    <main class="mx-auto max-w-7xl px-4 py-8 sm:px-8">
      <header class="mb-8 rounded-2xl border border-cyan-400/20 bg-gradient-to-r from-beast-panel to-beast-panelSoft p-6 shadow-neon">
        <p class="mb-2 text-xs uppercase tracking-[0.2em] text-cyan-300/80">SYNAPSE BEAST • MARKETPLACE-READY</p>
        <div class="flex flex-wrap items-end justify-between gap-4">
          <div>
            <h1 class="text-3xl font-bold sm:text-4xl">Autonomous Incident Defense Console</h1>
            <p class="mt-2 text-slate-300">Live SRE + Cyber posture for investor demos and enterprise sales calls.</p>
          </div>
          <div class="flex flex-wrap items-center gap-2">
            <label for="tenantId" class="text-sm text-slate-300">Tenant</label>
            <input id="tenantId" class="rounded-xl border border-slate-600 bg-slate-900 px-3 py-2 text-sm outline-none ring-cyan-300/40 transition focus:ring" value="demo-tenant" />
            <button id="refreshBtn" class="rounded-xl bg-cyan-400 px-4 py-2 text-sm font-semibold text-slate-900 transition hover:bg-cyan-300">Refresh</button>
          </div>
        </div>
      </header>

      <section class="mb-8 grid gap-4 sm:grid-cols-2 lg:grid-cols-4">
        <article class="rounded-2xl border border-slate-700 bg-beast-panel p-5">
          <p class="text-xs uppercase tracking-wide text-slate-400">Total Incidents</p>
          <p id="incidentsCount" class="mt-3 text-3xl font-bold text-cyan-300">—</p>
        </article>
        <article class="rounded-2xl border border-slate-700 bg-beast-panel p-5">
          <p class="text-xs uppercase tracking-wide text-slate-400">Auto-Resolved</p>
          <p id="autoResolvedCount" class="mt-3 text-3xl font-bold text-emerald-300">—</p>
        </article>
        <article class="rounded-2xl border border-slate-700 bg-beast-panel p-5">
          <p class="text-xs uppercase tracking-wide text-slate-400">Escalated</p>
          <p id="escalatedCount" class="mt-3 text-3xl font-bold text-rose-300">—</p>
        </article>
        <article class="rounded-2xl border border-slate-700 bg-beast-panel p-5">
          <p class="text-xs uppercase tracking-wide text-slate-400">Protected Value</p>
          <p id="impactDollars" class="mt-3 text-3xl font-bold text-amber-300">—</p>
        </article>
      </section>

      <section class="rounded-2xl border border-slate-700 bg-beast-panel p-6">
        <div class="mb-4 flex flex-wrap items-center justify-between gap-3">
          <h2 class="text-xl font-semibold">Incident Timeline</h2>
          <div class="flex gap-2">
            <button data-days="7" class="range-btn rounded-lg border border-slate-600 px-3 py-1.5 text-sm text-slate-300 hover:border-cyan-300 hover:text-cyan-200">7 Days</button>
            <button data-days="30" class="range-btn rounded-lg border border-cyan-400 bg-cyan-400/10 px-3 py-1.5 text-sm text-cyan-200">30 Days</button>
          </div>
        </div>

        <div class="overflow-hidden rounded-xl border border-slate-700">
          <table class="min-w-full divide-y divide-slate-700 text-sm">
            <thead class="bg-slate-900/70 text-left text-xs uppercase tracking-wide text-slate-400">
              <tr>
                <th class="px-4 py-3">Time</th>
                <th class="px-4 py-3">Service</th>
                <th class="px-4 py-3">Error Rate</th>
                <th class="px-4 py-3">Status</th>
                <th class="px-4 py-3">Action</th>
              </tr>
            </thead>
            <tbody id="timelineBody" class="divide-y divide-slate-800 bg-slate-950/40"></tbody>
          </table>
        </div>

        <p id="statusLine" class="mt-4 text-xs text-slate-400">Waiting for data...</p>
      </section>
    </main>

    <script>
      const elements = {
        tenantId: document.getElementById("tenantId"),
        refreshBtn: document.getElementById("refreshBtn"),
        incidentsCount: document.getElementById("incidentsCount"),
        autoResolvedCount: document.getElementById("autoResolvedCount"),
        escalatedCount: document.getElementById("escalatedCount"),
        impactDollars: document.getElementById("impactDollars"),
        timelineBody: document.getElementById("timelineBody"),
        statusLine: document.getElementById("statusLine"),
        rangeButtons: [...document.querySelectorAll(".range-btn")],
      };

      let selectedDays = 30;

      function setLoadingState() {
        elements.statusLine.textContent = "Syncing with Beast APIs...";
      }

      function setErrorState(message) {
        elements.statusLine.textContent = `Error: ${message}`;
      }

      function formatCurrency(value) {
        return new Intl.NumberFormat("en-US", {
          style: "currency",
          currency: "USD",
          maximumFractionDigits: 0,
        }).format(value || 0);
      }

      function statusBadge(status) {
        const normalized = (status || "").toLowerCase();
        if (normalized === "auto_resolved") {
          return '<span class="rounded-full bg-emerald-400/20 px-2 py-1 text-xs text-emerald-200">AUTO_RESOLVED</span>';
        }
        if (normalized === "escalated") {
          return '<span class="rounded-full bg-rose-400/20 px-2 py-1 text-xs text-rose-200">ESCALATED</span>';
        }
        return `<span class="rounded-full bg-slate-600/40 px-2 py-1 text-xs text-slate-200">${status || "unknown"}</span>`;
      }

      function renderTimeline(incidents) {
        if (!incidents?.length) {
          elements.timelineBody.innerHTML = '<tr><td colspan="5" class="px-4 py-6 text-center text-slate-400">No incidents found in this window.</td></tr>';
          return;
        }

        elements.timelineBody.innerHTML = incidents
          .map((item) => {
            const occurred = new Date(item.occurred_at).toLocaleString();
            const serviceName = item.title || "Unknown service";
            const errorRate = typeof item.error_rate === "number" ? `${item.error_rate.toFixed(2)}%` : "—";
            const action = item.action_taken || "Queued diagnosis";

            return `
              <tr class="hover:bg-slate-900/50">
                <td class="px-4 py-3 text-slate-300">${occurred}</td>
                <td class="px-4 py-3 font-medium text-slate-100">${serviceName}</td>
                <td class="px-4 py-3 text-rose-200">${errorRate}</td>
                <td class="px-4 py-3">${statusBadge(item.status)}</td>
                <td class="px-4 py-3 text-cyan-200">${action}</td>
              </tr>
            `;
          })
          .join("");
      }

      async function fetchJSON(url) {
        const res = await fetch(url);
        if (!res.ok) {
          let errorDetails = `${res.status} ${res.statusText}`;
          try {
            const body = await res.json();
            if (body.detail) errorDetails = body.detail;
          } catch (_err) {
            // best effort
          }
          throw new Error(errorDetails);
        }
        return res.json();
      }

      async function refreshDashboard() {
        const tenantId = elements.tenantId.value.trim();
        if (!tenantId) {
          setErrorState("tenant_id is required");
          return;
        }

        setLoadingState();

        try {
          const [roi, incidents] = await Promise.all([
            fetchJSON(`/v1/dashboard/roi?tenant_id=${encodeURIComponent(tenantId)}&days=${selectedDays}`),
            fetchJSON(`/v1/dashboard/incidents?tenant_id=${encodeURIComponent(tenantId)}&limit=50`),
          ]);

          elements.incidentsCount.textContent = roi.incidents_count;
          elements.autoResolvedCount.textContent = roi.auto_resolved_count;
          elements.escalatedCount.textContent = roi.escalated_count;
          elements.impactDollars.textContent = formatCurrency(roi.total_impact_dollars);

          renderTimeline(incidents.incidents || []);
          elements.statusLine.textContent = `Loaded ${incidents.total} incidents for ${tenantId} • window ${selectedDays} days.`;
        } catch (err) {
          setErrorState(err.message || "Unable to fetch dashboard data");
        }
      }

      function setActiveRange(days) {
        selectedDays = days;
        elements.rangeButtons.forEach((btn) => {
          const isActive = Number(btn.dataset.days) === days;
          btn.className = isActive
            ? "range-btn rounded-lg border border-cyan-400 bg-cyan-400/10 px-3 py-1.5 text-sm text-cyan-200"
            : "range-btn rounded-lg border border-slate-600 px-3 py-1.5 text-sm text-slate-300 hover:border-cyan-300 hover:text-cyan-200";
        });
      }

      elements.refreshBtn.addEventListener("click", refreshDashboard);
      elements.rangeButtons.forEach((btn) => {
        btn.addEventListener("click", () => {
          setActiveRange(Number(btn.dataset.days));
          refreshDashboard();
        });
      });

      refreshDashboard();
    </script>
  </body>
</html>
