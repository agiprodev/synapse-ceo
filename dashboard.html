<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rises Synapse PRO | Autonomous SRE Control Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "ui-sans-serif", "system-ui"],
            },
            colors: {
              synapse: {
                bg: "#020617",
                panel: "#0b1222",
                panelSoft: "#111a30",
                cyan: "#22d3ee",
                blue: "#38bdf8",
                emerald: "#34d399",
              },
            },
            boxShadow: {
              glowCyan: "0 0 30px rgba(56, 189, 248, 0.15)",
              glowGreen: "0 0 25px rgba(52, 211, 153, 0.2)",
            },
            keyframes: {
              pulseGlow: {
                "0%, 100%": { boxShadow: "0 0 0 rgba(52,211,153,0.0)" },
                "50%": { boxShadow: "0 0 14px rgba(52,211,153,0.6)" },
              },
              enterUp: {
                "0%": { opacity: "0", transform: "translateY(10px)" },
                "100%": { opacity: "1", transform: "translateY(0)" },
              },
            },
            animation: {
              pulseGlow: "pulseGlow 2s ease-in-out infinite",
              enterUp: "enterUp 700ms ease-out both",
            },
          },
        },
      };
    </script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>

  <body class="min-h-screen bg-slate-950 text-slate-200 antialiased">
    <div id="root"></div>

    <script type="text/babel">
      const { useEffect, useState, useMemo } = React;

      const MetricCard = ({ icon, label, value, hint, accent = "cyan", delay = 0 }) => (
        <div className={`group rounded-2xl border border-slate-800 bg-synapse-panel/90 p-5 shadow-glowCyan transition duration-300 animate-enterUp ${accent === "emerald" ? "hover:border-emerald-400/40" : "hover:border-cyan-400/40"}`} style={{ animationDelay: `${delay}ms` }}>
          <div className="flex items-center justify-between">
            <p className="text-xs uppercase tracking-[0.18em] text-slate-400">{label}</p>
            <i data-lucide={icon} className={`h-4 w-4 ${accent === "emerald" ? "text-emerald-300" : "text-cyan-300"}`}></i>
          </div>
          <p className={`mt-3 text-3xl font-semibold ${accent === "emerald" ? "text-emerald-300" : "text-cyan-200"}`}>{value}</p>
          <p className="mt-2 text-xs text-slate-400">{hint}</p>
        </div>
      );

      const App = () => {
        const [history, setHistory] = useState(Array(64).fill(10));
        const [currentCpu, setCurrentCpu] = useState(0);
        const [currentMem, setCurrentMem] = useState(0);
        const [alert, setAlert] = useState(null);

        useEffect(() => {
          lucide.createIcons();

          const eventSource = new EventSource("/stream");

          eventSource.onmessage = (e) => {
            const data = JSON.parse(e.data);

            if (data.type === "metrics") {
              setCurrentCpu(data.cpu);
              setCurrentMem(data.mem);
              setHistory((prev) => {
                const newHistory = [...prev.slice(1), data.cpu];
                return newHistory;
              });
            } else if (data.type === "alert") {
              setAlert(data);
            }
          };

          return () => eventSource.close();
        }, []);

        const path = history.map((v, i) => `${i === 0 ? "M" : "L"} ${(i / (history.length - 1)) * 100} ${100 - v}`).join(" ");

        return (
          <main className="mx-auto max-w-7xl px-6 py-8 lg:px-10">
            <nav className="mb-6 flex flex-wrap items-center justify-between rounded-2xl border border-slate-800 bg-synapse-panel/90 p-4 shadow-glowCyan">
              <div className="flex items-center gap-3">
                <div className="rounded-xl border border-cyan-400/30 bg-cyan-400/10 p-2">
                  <i data-lucide="cpu" className="h-5 w-5 text-cyan-300"></i>
                </div>
                <div>
                  <p className="text-sm uppercase tracking-[0.2em] text-slate-400">Rises</p>
                  <h1 className="text-xl font-semibold text-slate-100">Synapse PRO</h1>
                </div>
              </div>
              <div className="flex items-center gap-4">
                <div className="flex items-center gap-2 rounded-full border border-emerald-400/30 bg-emerald-500/10 px-4 py-2 text-sm text-emerald-200 animate-pulseGlow">
                  <span className="h-2 w-2 rounded-full bg-emerald-300"></span>
                  Real-time Telemetry Linked
                </div>
              </div>
            </nav>

            <section className="mb-6 grid gap-4 lg:grid-cols-3">
              <MetricCard icon="server" label="Live CPU Load" value={`${currentCpu.toFixed(1)}%`} hint="Actual processing load" delay={50} />
              <MetricCard icon="database" label="Memory Pressure" value={`${currentMem.toFixed(1)}%`} hint="Actual RAM utilization" delay={150} />
              <MetricCard icon="shield-check" label="System Status" value={alert ? "Intervening" : "Stable"} hint={alert ? "Executing autonomous fix" : "All services optimal"} accent="emerald" delay={250} />
            </section>

            <section className="grid gap-6 lg:grid-cols-[1.35fr_1fr]">
              <div className="relative overflow-hidden rounded-2xl border border-cyan-400/20 bg-gradient-to-br from-slate-950 to-synapse-panel p-6 shadow-glowCyan">
                <div className="mb-4 flex items-center justify-between">
                  <h3 className="text-lg font-semibold text-slate-100">Real-time Host Pulse</h3>
                  {currentCpu > 80 && <div className="rounded-full border border-red-400/30 bg-red-400/10 px-3 py-1 text-xs text-red-200 animate-pulse">High Load Detected</div>}
                </div>
                <div className="relative h-64 rounded-xl border border-slate-800 bg-slate-950/70 p-4 transition-all">
                  <svg viewBox="0 0 100 100" className="h-full w-full preserve-3d">
                    <defs>
                      <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
                        <stop offset="0%" stopColor={currentCpu > 80 ? "#ef4444" : "#22d3ee"} />
                        <stop offset="100%" stopColor={currentCpu > 80 ? "#f87171" : "#34d399"} />
                      </linearGradient>
                    </defs>
                    <path d={path} fill="none" stroke="url(#lineGrad)" strokeWidth="1.6" strokeLinecap="round" className="transition-all duration-300 ease-linear" />
                  </svg>
                </div>
              </div>

              <aside className={`rounded-2xl border ${alert ? 'border-emerald-500/50 shadow-glowGreen' : 'border-slate-800'} bg-synapse-panel/90 p-6 transition-all duration-500`}>
                <div className="mb-4 flex items-center justify-between">
                  <h3 className="text-lg font-semibold">Autonomous Execution</h3>
                  <i data-lucide="bot" className={`h-5 w-5 ${alert ? 'text-emerald-400 animate-pulse' : 'text-slate-500'}`}></i>
                </div>

                {alert ? (
                  <div className="animate-enterUp">
                    <div className="space-y-3 text-sm">
                      <div className="rounded-xl border border-slate-800 bg-slate-950/60 p-3">
                        <p className="text-slate-400">Severity Trigger</p>
                        <p className="mt-1 font-medium text-red-400">{alert.severity}</p>
                      </div>
                      <div className="rounded-xl border border-slate-800 bg-slate-950/60 p-3">
                        <p className="text-slate-400">Action Deployed</p>
                        <p className="mt-1 font-medium text-emerald-300">{alert.action}</p>
                      </div>
                    </div>
                    <div className="mt-5 rounded-xl border border-emerald-400/20 bg-slate-950 p-4 font-mono text-xs leading-6 text-emerald-200">
                      <p className="mb-2 text-emerald-300">Live Reasoning Log</p>
                      <p>&gt; {alert.reasoning}</p>
                      <p className="mt-2 text-cyan-400">&gt; Command Execution: {alert.cmd}</p>
                    </div>
                  </div>
                ) : (
                  <div className="flex h-48 flex-col items-center justify-center text-slate-500">
                    <i data-lucide="shield" className="mb-3 h-8 w-8 opacity-50"></i>
                    <p>Monitoring system state...</p>
                    <p className="text-xs">Awaiting anomalies to execute remediation.</p>
                  </div>
                )}
              </aside>
            </section>
          </main>
        );
      };

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
