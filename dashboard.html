<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rises Synapse PRO | Autonomous SRE Control Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "ui-sans-serif", "system-ui"],
            },
            colors: {
              synapse: {
                bg: "#020617",
                panel: "#0b1222",
                panelSoft: "#111a30",
                cyan: "#22d3ee",
                blue: "#38bdf8",
                emerald: "#34d399",
              },
            },
            boxShadow: {
              glowCyan: "0 0 30px rgba(56, 189, 248, 0.15)",
              glowGreen: "0 0 25px rgba(52, 211, 153, 0.2)",
            },
            keyframes: {
              pulseGlow: {
                "0%, 100%": { boxShadow: "0 0 0 rgba(52,211,153,0.0)" },
                "50%": { boxShadow: "0 0 14px rgba(52,211,153,0.6)" },
              },
              enterUp: {
                "0%": { opacity: "0", transform: "translateY(10px)" },
                "100%": { opacity: "1", transform: "translateY(0)" },
              },
            },
            animation: {
              pulseGlow: "pulseGlow 2s ease-in-out infinite",
              enterUp: "enterUp 700ms ease-out both",
            },
          },
        },
      };
    </script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>

  <body class="min-h-screen bg-slate-950 text-slate-200 antialiased">
    <div id="root"></div>

    <script type="text/babel">
      const { useEffect, useMemo, useState } = React;

      const MetricCard = ({ icon, label, value, hint, accent = "cyan", delay = 0 }) => (
        <div
          className={`group rounded-2xl border border-slate-800 bg-synapse-panel/90 p-5 shadow-glowCyan transition duration-300 hover:-translate-y-1 animate-enterUp ${
            accent === "emerald" ? "hover:border-emerald-400/40" : "hover:border-cyan-400/40"
          }`}
          style={{ animationDelay: `${delay}ms` }}
        >
          <div className="flex items-center justify-between">
            <p className="text-xs uppercase tracking-[0.18em] text-slate-400">{label}</p>
            <i data-lucide={icon} className={`h-4 w-4 ${accent === "emerald" ? "text-emerald-300" : "text-cyan-300"}`}></i>
          </div>
          <p className={`mt-3 text-3xl font-semibold ${accent === "emerald" ? "text-emerald-300" : "text-cyan-200"}`}>{value}</p>
          <p className="mt-2 text-xs text-slate-400">{hint}</p>
        </div>
      );

      const SparkChart = () => {
        const points = useMemo(() => {
          const arr = [];
          for (let i = 0; i < 64; i++) {
            const base = 52 + Math.sin(i / 4) * 8 + Math.random() * 2;
            const spike = i > 24 && i < 32 ? (i - 24) * 6 : i >= 32 && i < 40 ? (40 - i) * 6 : 0;
            const stabilized = i > 40 ? -Math.sin(i / 2) * 4 - 5 : 0;
            const v = Math.max(20, Math.min(90, base + spike + stabilized));
            arr.push(v);
          }
          return arr;
        }, []);

        const path = points
          .map((v, i) => `${i === 0 ? "M" : "L"} ${(i / (points.length - 1)) * 100} ${100 - v}`)
          .join(" ");

        return (
          <div className="relative overflow-hidden rounded-2xl border border-cyan-400/20 bg-gradient-to-br from-slate-950 to-synapse-panel p-6 shadow-glowCyan animate-enterUp">
            <div className="mb-4 flex items-center justify-between">
              <h3 className="text-lg font-semibold text-slate-100">Live Pulse Visualizer</h3>
              <div className="rounded-full border border-emerald-400/30 bg-emerald-400/10 px-3 py-1 text-xs text-emerald-200">Spike Neutralized</div>
            </div>
            <div className="relative h-64 rounded-xl border border-slate-800 bg-slate-950/70 p-4">
              <svg viewBox="0 0 100 100" className="h-full w-full">
                <defs>
                  <linearGradient id="lineGradient" x1="0" y1="0" x2="1" y2="0">
                    <stop offset="0%" stopColor="#22d3ee" />
                    <stop offset="100%" stopColor="#34d399" />
                  </linearGradient>
                </defs>
                <path d={path} fill="none" stroke="url(#lineGradient)" strokeWidth="1.6" strokeLinecap="round">
                  <animate attributeName="stroke-dasharray" values="0,300;300,0" dur="3s" repeatCount="indefinite" />
                </path>
              </svg>
              <div className="pointer-events-none absolute inset-0 bg-[radial-gradient(circle_at_50%_0%,rgba(56,189,248,0.15),transparent_50%)]"></div>
              <div className="absolute right-4 top-4 text-xs text-slate-400">CPU / Memory Stream • 4ms tick</div>
            </div>
          </div>
        );
      };

      const App = () => {
        const [confidence] = useState(94);

        useEffect(() => {
          lucide.createIcons();
        }, []);

        return (
          <main className="mx-auto max-w-7xl px-6 py-8 lg:px-10">
            <nav className="mb-6 rounded-2xl border border-slate-800 bg-synapse-panel/90 p-4 shadow-glowCyan backdrop-blur animate-enterUp">
              <div className="flex flex-wrap items-center justify-between gap-4">
                <div className="flex items-center gap-3">
                  <div className="rounded-xl border border-cyan-400/30 bg-cyan-400/10 p-2">
                    <i data-lucide="cpu" className="h-5 w-5 text-cyan-300"></i>
                  </div>
                  <div>
                    <p className="text-sm uppercase tracking-[0.2em] text-slate-400">Rises</p>
                    <h1 className="text-xl font-semibold text-slate-100">Synapse PRO</h1>
                  </div>
                </div>

                <div className="flex items-center gap-4">
                  <div className="flex items-center gap-2 rounded-full border border-emerald-400/30 bg-emerald-500/10 px-4 py-2 text-sm text-emerald-200 animate-pulseGlow">
                    <span className="h-2 w-2 rounded-full bg-emerald-300"></span>
                    Autonomous Mode Active
                  </div>
                  <div className="flex h-10 w-10 items-center justify-center rounded-full border border-slate-700 bg-slate-900 text-sm font-semibold text-cyan-200">CTO</div>
                </div>
              </div>
            </nav>

            <section className="mb-6 grid gap-4 lg:grid-cols-3">
              <MetricCard icon="shield-check" label="Incidents Prevented" value="14" hint="This week across production workloads" delay={50} />
              <MetricCard icon="zap" label="Near-Zero MTTR" value="0.4s" hint="Average autonomous remediation window" delay={150} />
              <MetricCard icon="banknote" label="Total Value Protected" value="$4,500" hint="Estimated outage + churn loss avoided" accent="emerald" delay={250} />
            </section>

            <section className="grid gap-6 lg:grid-cols-[1.35fr_1fr]">
              <SparkChart />

              <aside className="rounded-2xl border border-slate-800 bg-synapse-panel/90 p-6 shadow-glowGreen animate-enterUp">
                <div className="mb-4 flex items-center justify-between">
                  <h3 className="text-lg font-semibold">Recent Autonomous Action</h3>
                  <i data-lucide="bot" className="h-5 w-5 text-cyan-300"></i>
                </div>

                <div className="space-y-3 text-sm">
                  <div className="rounded-xl border border-slate-800 bg-slate-950/60 p-3">
                    <p className="text-slate-400">Event</p>
                    <p className="mt-1 font-medium text-slate-100">Predictive Traffic Surge Detected</p>
                  </div>
                  <div className="rounded-xl border border-slate-800 bg-slate-950/60 p-3">
                    <p className="text-slate-400">Target</p>
                    <p className="mt-1 font-medium text-cyan-200">production-auth-cluster</p>
                  </div>
                  <div className="rounded-xl border border-slate-800 bg-slate-950/60 p-3">
                    <p className="text-slate-400">Action Taken</p>
                    <p className="mt-1 font-medium text-emerald-300">Executed Scaling (+2 nodes)</p>
                  </div>
                </div>

                <div className="mt-5 rounded-xl border border-cyan-400/20 bg-cyan-500/5 p-4">
                  <p className="text-xs uppercase tracking-[0.16em] text-cyan-300">Decision Confidence</p>
                  <div className="mt-2 flex items-center justify-between">
                    <p className="text-3xl font-semibold text-cyan-200">{confidence}%</p>
                    <div className="h-2 w-32 overflow-hidden rounded-full bg-slate-800">
                      <div className="h-full rounded-full bg-gradient-to-r from-cyan-400 to-emerald-400" style={{ width: `${confidence}%` }}></div>
                    </div>
                  </div>
                </div>

                <div className="mt-5 rounded-xl border border-emerald-400/20 bg-slate-950 p-4 font-mono text-xs leading-6 text-emerald-200">
                  <p className="mb-2 text-emerald-300">AI Reasoning Log (Explainable Cause)</p>
                  <p>&gt; CPU spiked by 25% in 10s while memory reached 82% threshold.</p>
                  <p>&gt; Forecast model predicted auth latency breach in 47s (p95).</p>
                  <p>&gt; Safe policy selected horizontal scale action for pod saturation mitigation.</p>
                  <p>&gt; Outcome: latency stabilized at 118ms, no customer impact observed.</p>
                </div>
              </aside>
            </section>
          </main>
        );
      };

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
